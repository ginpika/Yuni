<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yuni AI Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="/i18n.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css">
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/core.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/javascript.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/python.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/java.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/bash.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/json.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/sql.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        primaryHover: '#2563eb',
                    }
                }
            }
        }
        marked.setOptions({
            highlight: function(code, lang) {
                if (lang && hljs.getLanguage(lang)) {
                    try {
                        return hljs.highlight(code, { language: lang }).value;
                    } catch (e) {}
                }
                return hljs.highlightAuto(code).value;
            },
            breaks: true,
            gfm: true
        });
    </script>
    <style>
        .chat-container {
            height: calc(100vh - 200px);
        }
        .message-enter {
            animation: slideIn 0.2s ease-out;
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .typing-indicator span {
            animation: bounce 1.2s infinite ease-in-out;
        }
        .typing-indicator span:nth-child(1) { animation-delay: 0s; }
        .typing-indicator span:nth-child(2) { animation-delay: 0.15s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.3s; }
        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-3px); }
        }
        .scrollbar-thin::-webkit-scrollbar {
            width: 5px;
        }
        .scrollbar-thin::-webkit-scrollbar-track {
            background: transparent;
        }
        .scrollbar-thin::-webkit-scrollbar-thumb {
            background: #e2e8f0;
            border-radius: 10px;
        }
        .scrollbar-thin::-webkit-scrollbar-thumb:hover {
            background: #cbd5e1;
        }
        .modal-overlay {
            animation: fadeIn 0.15s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .modal-content {
            animation: slideUp 0.2s ease-out;
        }
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        .message-bubble {
            cursor: pointer;
            transition: all 0.15s ease;
        }
        .message-bubble:hover {
            filter: brightness(0.97);
        }
        .json-viewer {
            max-height: 60vh;
            overflow: auto;
        }
        .json-viewer::-webkit-scrollbar {
            width: 6px;
        }
        .json-viewer::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 3px;
        }
        .json-viewer::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }
        .json-key { color: #0ea5e9; }
        .json-string { color: #22c55e; }
        .json-number { color: #f59e0b; }
        .json-boolean { color: #a855f7; }
        .json-null { color: #94a3b8; }
        .history-message {
            opacity: 0.8;
        }
        .context-bar {
            transition: width 0.3s ease;
        }
        .ws-status {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
        .ws-connected { background-color: #22c55e; }
        .ws-disconnected { background-color: #ef4444; }
        .ws-connecting { background-color: #f59e0b; animation: pulse 1s infinite; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .markdown-content {
            line-height: 1.6;
        }
        .markdown-content p {
            margin: 0 0 0.75em 0;
        }
        .markdown-content p:last-child {
            margin-bottom: 0;
        }
        .markdown-content h1, .markdown-content h2, .markdown-content h3,
        .markdown-content h4, .markdown-content h5, .markdown-content h6 {
            margin: 0.75em 0 0.5em 0;
            font-weight: 600;
            line-height: 1.3;
        }
        .markdown-content h1 { font-size: 1.4em; }
        .markdown-content h2 { font-size: 1.25em; }
        .markdown-content h3 { font-size: 1.1em; }
        .markdown-content ul, .markdown-content ol {
            margin: 0.5em 0;
            padding-left: 1.5em;
        }
        .markdown-content li {
            margin: 0.25em 0;
        }
        .markdown-content code {
            background: rgba(0, 0, 0, 0.1);
            padding: 0.15em 0.4em;
            border-radius: 4px;
            font-size: 0.9em;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        }
        .markdown-content pre {
            margin: 0.75em 0;
            padding: 0.75em 1em;
            border-radius: 8px;
            overflow-x: auto;
            background: #1e293b;
        }
        .markdown-content pre code {
            background: transparent;
            padding: 0;
            font-size: 0.85em;
            color: #e2e8f0;
        }
        .markdown-content blockquote {
            margin: 0.75em 0;
            padding: 0.5em 1em;
            border-left: 3px solid #3b82f6;
            background: rgba(59, 130, 246, 0.1);
            border-radius: 0 4px 4px 0;
        }
        .markdown-content blockquote p {
            margin: 0;
        }
        .markdown-content table {
            margin: 0.75em 0;
            border-collapse: collapse;
            width: 100%;
        }
        .markdown-content th, .markdown-content td {
            border: 1px solid #e2e8f0;
            padding: 0.5em 0.75em;
            text-align: left;
        }
        .markdown-content th {
            background: #f8fafc;
            font-weight: 600;
        }
        .markdown-content a {
            color: #3b82f6;
            text-decoration: underline;
        }
        .markdown-content a:hover {
            color: #2563eb;
        }
        .markdown-content hr {
            margin: 1em 0;
            border: none;
            border-top: 1px solid #e2e8f0;
        }
        .markdown-content img {
            max-width: 100%;
            border-radius: 8px;
        }
        .markdown-content .task-list-item {
            list-style: none;
            margin-left: -1.5em;
        }
        .markdown-content .task-list-item input {
            margin-right: 0.5em;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">
    <div id="sessionSelectorArea" class="fixed top-0 left-0 right-0 flex justify-center z-40">
        <div id="sessionTrigger" class="flex flex-col items-center cursor-pointer group w-[500px]" onmouseenter="showSessionDropdown()" onmouseleave="hideSessionDropdownTimer()">
            <svg class="w-4 h-4 text-slate-400 group-hover:text-slate-600 transition-colors" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
            </svg>
            <span id="currentSessionLabel" class="text-xs text-slate-400 group-hover:text-slate-600 truncate max-w-[480px] transition-colors" data-i18n="newConversation">新对话</span>
        </div>
        <div id="sessionDropdown" class="hidden absolute top-full mt-2 w-[500px] bg-white rounded-md shadow-sm border border-slate-200 z-50" onmouseenter="cancelHideSessionDropdown()" onmouseleave="hideSessionDropdown()">
            <div id="sessionList" class="max-h-72 overflow-y-auto py-1"></div>
            <div id="loadMoreBtn" class="hidden border-t border-slate-100">
                <button onclick="loadMoreSessions()" class="w-full px-3 py-2 text-xs text-slate-400 hover:text-slate-600 hover:bg-slate-50 transition-colors text-center" data-i18n="loadMore">
                    加载更多
                </button>
            </div>
        </div>
    </div>
    
    <div class="max-w-[1100px] min-w-[800px] mx-auto p-4 h-screen flex flex-col">
        <header class="flex items-center justify-between py-3 mb-3">
            <div class="flex items-center gap-2.5">
                <div class="w-9 h-9 bg-primary rounded-lg flex items-center justify-center">
                    <svg class="w-5 h-5 text-white" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
                    </svg>
                </div>
                <div>
                    <h1 class="text-lg font-semibold text-slate-800">Yuni</h1>
                </div>
                <div class="flex items-center gap-1.5 ml-2">
                    <div id="wsStatus" class="ws-status ws-disconnected" data-i18n-title="wsStatus"></div>
                    <span id="wsStatusText" class="text-xs text-slate-400" data-i18n="wsDisconnected">未连接</span>
                </div>
            </div>
            
            <div class="flex items-center gap-1.5">
                <a href="/database.html" class="px-3 py-1.5 text-sm text-slate-500 hover:text-slate-700 hover:bg-slate-100 rounded-md transition-colors flex items-center gap-1.5" data-i18n-title="databaseTitle">
                    <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M4 7v10c0 1.1.9 2.63L4 17h16M4 17l4-4M4 7zm0 0l4-4m4 4-4 4M4 7z"/>
                        <circle cx="8" cy="11" r="1.5"/>
                        <circle cx="12" cy="11" r="1.5"/>
                        <circle cx="16" cy="11" r="1.5"/>
                    </svg>
                    <span data-i18n="database">数据库</span>
                </a>
                <button onclick="createNewSession()" class="px-3 py-1.5 text-sm text-primary hover:bg-blue-50 rounded-md transition-colors flex items-center gap-1.5">
                    <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
                    </svg>
                    <span data-i18n="newConversation">新对话</span>
                </button>
                <button onclick="clearChat()" class="px-3 py-1.5 text-sm text-slate-500 hover:text-slate-700 hover:bg-slate-100 rounded-md transition-colors flex items-center gap-1.5">
                    <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                    <span data-i18n="clear">清空</span>
                </button>
                <div class="relative" id="langDropdownContainer">
                    <button onclick="toggleLangDropdown()" class="p-1.5 text-slate-500 hover:text-slate-700 hover:bg-slate-100 rounded-md transition-colors" title="Switch Language">
                        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 21a9.004 9.004 0 008.716-6.747M12 21a9.004 9.004 0 01-8.716-6.747M12 21c2.485 0 4.5-4.03 4.5-9S14.485 3 12 3m0 18c-2.485 0-4.5-4.03-4.5-9S9.515 3 12 3m0 0a8.997 8.997 0 017.843 4.582M12 3a8.997 8.997 0 00-7.843 4.582m15.686 0A11.953 11.953 0 0112 10.5c-2.998 0-5.74-1.1-7.843-2.918m15.686 0A8.959 8.959 0 0121 12c0 .778-.099 1.533-.284 2.253m0 0A17.919 17.919 0 0112 16.5c-3.162 0-6.133-.815-8.716-2.247m0 0A9.015 9.015 0 013 12c0-1.605.42-3.113 1.157-4.418"/>
                        </svg>
                    </button>
                    <div id="langDropdown" class="hidden absolute top-full right-0 mt-1 w-28 bg-white rounded-md shadow-sm border border-slate-200 py-1 z-50">
                        <button onclick="setLanguage('zh')" class="w-full px-3 py-1.5 text-sm text-slate-700 hover:bg-slate-50 transition-colors text-left flex items-center gap-2">
                            <span id="langCheckZh" class="w-4 text-primary">✓</span>
                            中文
                        </button>
                        <button onclick="setLanguage('en')" class="w-full px-3 py-1.5 text-sm text-slate-700 hover:bg-slate-50 transition-colors text-left flex items-center gap-2">
                            <span id="langCheckEn" class="w-4"></span>
                            English
                        </button>
                    </div>
                </div>
            </div>
        </header>

        <div class="bg-white rounded-xl border border-slate-200 px-4 py-2 mb-3">
            <div class="flex items-center justify-between mb-1.5">
                <div class="flex items-center gap-2">
                    <svg class="w-4 h-4 text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z"/>
                    </svg>
                    <span class="text-xs text-slate-500" data-i18n="contextUsage">上下文用量</span>
                </div>
                <span id="usageText" class="text-xs text-slate-500">0 / 128000 <span data-i18n="tokens">tokens</span></span>
            </div>
            <div class="h-1.5 bg-slate-100 rounded-full overflow-hidden">
                <div id="usageBar" class="context-bar h-full bg-primary rounded-full" style="width: 0%"></div>
            </div>
        </div>

        <div id="chatContainer" class="chat-container overflow-y-auto scrollbar-thin bg-white rounded-xl border border-slate-200 p-5 space-y-4">
            <div class="flex items-center justify-center py-8 text-slate-400">
                <svg class="w-5 h-5 mr-2 animate-spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                </svg>
                <span data-i18n="loadingHistory">加载历史消息...</span>
            </div>
        </div>

        <div class="mt-3 bg-white rounded-xl border border-slate-200 p-2.5">
            <form id="chatForm" class="flex gap-2.5">
                <div class="flex-1 relative">
                    <textarea 
                        id="userInput" 
                        rows="1"
                        data-i18n="inputPlaceholder"
                        placeholder="输入你的问题..."
                        class="w-full resize-none border-0 focus:ring-0 focus:outline-none text-slate-700 text-sm placeholder-slate-400 py-1.5 px-1 max-h-28"
                        onkeydown="handleKeyDown(event)"
                        oninput="autoResize(this)"
                    ></textarea>
                </div>
                <button 
                    type="submit" 
                    id="sendBtn"
                    class="px-4 py-2 bg-primary hover:bg-primaryHover text-white text-sm font-medium rounded-lg transition-colors flex items-center gap-1.5 disabled:opacity-40 disabled:cursor-not-allowed"
                >
                    <span data-i18n="send">发送</span>
                    <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M5 12h14M12 5l7 7-7 7"/>
                    </svg>
                </button>
            </form>
        </div>
    </div>

    <div id="permissionModal" class="hidden fixed inset-0 z-50">
        <div class="modal-overlay absolute inset-0 bg-black/30" onclick="closePermissionModal()"></div>
        <div class="absolute inset-0 flex items-center justify-center p-4">
            <div class="modal-content bg-white rounded-xl shadow-xl max-w-md w-full p-5">
                <div class="flex items-center gap-3 mb-4">
                    <div class="w-10 h-10 bg-amber-100 rounded-lg flex items-center justify-center">
                        <svg class="w-5 h-5 text-amber-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                        </svg>
                    </div>
                    <div>
                        <h3 class="text-base font-semibold text-slate-800" data-i18n="permissionRequest">权限请求</h3>
                        <p class="text-xs text-slate-500" data-i18n="aiTerminalRequest">AI 请求执行终端命令</p>
                    </div>
                </div>
                
                <div class="bg-slate-50 rounded-lg p-3 mb-4">
                    <p class="text-xs text-slate-500 mb-1" data-i18n="command">命令：</p>
                    <code id="permissionCommand" class="text-sm text-slate-800 font-mono break-all"></code>
                </div>
                
                <div id="permissionReason" class="text-sm text-slate-600 mb-4"></div>

                <div class="flex items-center gap-2 mb-4">
                    <input type="checkbox" id="rememberChoice" class="w-4 h-4 rounded border-slate-300 text-primary focus:ring-primary">
                    <label for="rememberChoice" class="text-sm text-slate-600" data-i18n="rememberCommand">记住此命令（加入白名单）</label>
                </div>

                <div class="flex gap-2">
                    <button onclick="rejectPermission()" class="flex-1 px-4 py-2 text-sm font-medium text-slate-700 bg-slate-100 hover:bg-slate-200 rounded-lg transition-colors" data-i18n="reject">
                        拒绝
                    </button>
                    <button onclick="approvePermission()" class="flex-1 px-4 py-2 text-sm font-medium text-white bg-primary hover:bg-primaryHover rounded-lg transition-colors" data-i18n="allow">
                        允许
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="jsonModal" class="hidden fixed inset-0 z-50">
        <div class="modal-overlay absolute inset-0 bg-black/30" onclick="closeJsonModal()"></div>
        <div class="absolute inset-0 flex items-center justify-center p-4">
            <div class="modal-content bg-white rounded-xl shadow-xl max-w-2xl w-full">
                <div class="flex items-center justify-between px-5 py-4 border-b border-slate-200">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 bg-slate-100 rounded-lg flex items-center justify-center">
                            <svg class="w-4 h-4 text-slate-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"/>
                            </svg>
                        </div>
                        <h3 class="text-base font-semibold text-slate-800" data-i18n="apiResponseDetail">API 响应详情</h3>
                    </div>
                    <button onclick="closeJsonModal()" class="p-1.5 text-slate-400 hover:text-slate-600 hover:bg-slate-100 rounded-md transition-colors">
                        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </button>
                </div>
                <div class="p-5">
                    <div class="json-viewer bg-slate-900 rounded-lg p-4">
                        <pre id="jsonContent" class="text-sm font-mono text-slate-100 whitespace-pre-wrap break-all"></pre>
                    </div>
                </div>
                <div class="px-5 py-3 border-t border-slate-200 flex justify-end gap-2">
                    <button onclick="copyJson()" class="px-4 py-2 text-sm font-medium text-slate-700 bg-slate-100 hover:bg-slate-200 rounded-lg transition-colors flex items-center gap-1.5">
                        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/>
                        </svg>
                        <span data-i18n="copy">复制</span>
                    </button>
                    <button onclick="closeJsonModal()" class="px-4 py-2 text-sm font-medium text-white bg-primary hover:bg-primaryHover rounded-lg transition-colors" data-i18n="close">
                        关闭
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chatContainer');
        const chatForm = document.getElementById('chatForm');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const permissionModal = document.getElementById('permissionModal');
        const permissionCommand = document.getElementById('permissionCommand');
        const permissionReason = document.getElementById('permissionReason');
        const rememberChoice = document.getElementById('rememberChoice');
        const jsonModal = document.getElementById('jsonModal');
        const jsonContent = document.getElementById('jsonContent');
        const usageBar = document.getElementById('usageBar');
        const usageText = document.getElementById('usageText');
        const wsStatus = document.getElementById('wsStatus');
        const wsStatusText = document.getElementById('wsStatusText');
        const sessionDropdown = document.getElementById('sessionDropdown');
        const sessionList = document.getElementById('sessionList');
        const loadMoreBtn = document.getElementById('loadMoreBtn');
        const currentSessionLabel = document.getElementById('currentSessionLabel');
        
        let isLoading = false;
        let currentPermissionRequestId = null;
        let currentJsonData = null;
        let currentSessionId = null;
        let stompClient = null;
        let hasMoreSessions = false;
        let sessionPage = 0;
        const pageSize = 5;
        let allSessions = [];
        let hideSessionTimer = null;

        function updateWsStatus(status) {
            currentWsStatus = status;
            wsStatus.className = 'ws-status ws-' + status;
            const statusTexts = {
                'connected': i18n.t('wsConnected'),
                'disconnected': i18n.t('wsDisconnected'),
                'connecting': i18n.t('wsConnecting')
            };
            wsStatusText.textContent = statusTexts[status] || status;
        }

        function toggleLanguage() {
            const newLang = i18n.getLang() === 'zh' ? 'en' : 'zh';
            setLanguage(newLang);
        }

        function setLanguage(lang) {
            i18n.setLang(lang);
            updateLangCheck();
            document.getElementById('langDropdown').classList.add('hidden');
            renderSessionList();
        }

        function updateLangCheck() {
            const lang = i18n.getLang();
            document.getElementById('langCheckZh').textContent = lang === 'zh' ? '✓' : '';
            document.getElementById('langCheckZh').className = lang === 'zh' ? 'w-4 text-primary' : 'w-4';
            document.getElementById('langCheckEn').textContent = lang === 'en' ? '✓' : '';
            document.getElementById('langCheckEn').className = lang === 'en' ? 'w-4 text-primary' : 'w-4';
        }

        function toggleLangDropdown() {
            document.getElementById('langDropdown').classList.toggle('hidden');
        }

        document.addEventListener('click', function(e) {
            const langContainer = document.getElementById('langDropdownContainer');
            if (langContainer && !langContainer.contains(e.target)) {
                document.getElementById('langDropdown').classList.add('hidden');
            }
        });

        function connectWebSocket() {
            updateWsStatus('connecting');
            
            const socket = new SockJS('/ws');
            stompClient = Stomp.over(socket);
            stompClient.debug = null;
            
            stompClient.connect({}, function(frame) {
                console.log('WebSocket 连接成功:', frame);
                updateWsStatus('connected');
                
                stompClient.subscribe('/topic/permission', function(message) {
                    console.log('收到权限请求:', message.body);
                    try {
                        handlePermissionRequest(JSON.parse(message.body));
                    } catch (e) {
                        console.error('解析权限请求失败:', e);
                    }
                });
                
                stompClient.subscribe('/topic/tool', function(message) {
                    console.log('收到工具通知:', message.body);
                    try {
                        handleToolNotification(JSON.parse(message.body));
                    } catch (e) {
                        console.error('解析工具通知失败:', e);
                    }
                });
            }, function(error) {
                console.error('WebSocket 连接失败:', error);
                updateWsStatus('disconnected');
                stompClient = null;
                
                setTimeout(connectWebSocket, 3000);
            });
        }

        function handleToolNotification(data) {
            if (data.type === 'tool_call') {
                addToolCallMessage(data.toolName, data.arguments);
            } else if (data.type === 'tool_result') {
                updateToolResultMessage(data.toolName, data.result);
            }
        }

        function addToolCallMessage(toolName, arguments) {
            removeTypingIndicator();
            
            const messageDiv = document.createElement('div');
            messageDiv.id = 'tool-' + toolName + '-call';
            messageDiv.className = 'flex items-start gap-2.5 message-enter';
            
            const avatar = `<div class="w-7 h-7 bg-emerald-500 rounded-md flex items-center justify-center flex-shrink-0"><svg class="w-4 h-4 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg></div>`;
            
            let argsDisplay = '';
            try {
                const argsObj = JSON.parse(arguments);
                argsDisplay = JSON.stringify(argsObj, null, 2);
            } catch (e) {
                argsDisplay = arguments;
            }
            
            messageDiv.innerHTML = `${avatar}<div class="message-bubble bg-emerald-50 text-emerald-800 rounded-xl border border-emerald-200 px-3.5 py-2.5 max-w-[80%]">
                <div class="flex items-center gap-2 mb-1">
                    <span class="text-sm font-medium">${escapeHtml(toolName)}</span>
                    <span class="text-xs text-emerald-500">${i18n.t('calling')}</span>
                </div>
                <pre class="text-xs text-emerald-600 whitespace-pre-wrap font-mono bg-emerald-100/50 rounded px-2 py-1 mt-1">${escapeHtml(argsDisplay)}</pre>
            </div>`;
            
            chatContainer.appendChild(messageDiv);
            scrollToBottom();
        }

        function updateToolResultMessage(toolName, result) {
            const callDiv = document.getElementById('tool-' + toolName + '-call');
            if (callDiv) {
                const statusSpan = callDiv.querySelector('.text-emerald-500');
                if (statusSpan) {
                    statusSpan.textContent = i18n.t('completed');
                    statusSpan.className = 'text-xs text-emerald-600';
                }
                
                const bubble = callDiv.querySelector('.message-bubble');
                if (bubble) {
                    let resultDisplay = '';
                    try {
                        const resultObj = JSON.parse(result);
                        if (resultObj.success !== undefined) {
                            resultDisplay = resultObj.success ? '✓ ' + i18n.t('success') : '✗ ' + i18n.t('failed');
                            if (resultObj.output) {
                                resultDisplay += '\n' + resultObj.output;
                            }
                        } else {
                            resultDisplay = JSON.stringify(resultObj, null, 2);
                        }
                    } catch (e) {
                        resultDisplay = result;
                    }
                    
                    const resultPre = document.createElement('pre');
                    resultPre.className = 'text-xs text-emerald-600 whitespace-pre-wrap font-mono bg-emerald-100/50 rounded px-2 py-1 mt-2';
                    resultPre.textContent = resultDisplay;
                    bubble.appendChild(resultPre);
                }
                
                scrollToBottom();
            }
        }

        function handlePermissionRequest(data) {
            if (data.type === 'permission_request') {
                console.log('处理权限请求:', data.requestId, data.command);
                currentPermissionRequestId = data.requestId;
                permissionCommand.textContent = data.command;
                permissionReason.textContent = data.reason || i18n.t('aiTerminalRequest');
                rememberChoice.checked = false;
                permissionModal.classList.remove('hidden');
            }
        }

        function closePermissionModal() {
            permissionModal.classList.add('hidden');
        }

        function approvePermission() {
            if (!currentPermissionRequestId) {
                console.error('没有权限请求ID');
                return;
            }
            
            if (!stompClient || !stompClient.connected) {
                console.error('WebSocket 未连接');
                alert(i18n.t('wsDisconnectedAlert'));
                return;
            }
            
            const remember = rememberChoice.checked;
            console.log('发送授权响应:', currentPermissionRequestId, true, remember);
            
            try {
                stompClient.send("/app/permission/response", {}, JSON.stringify({
                    requestId: currentPermissionRequestId,
                    approved: true,
                    remember: remember
                }));
            } catch (e) {
                console.error('发送响应失败:', e);
            }
            
            closePermissionModal();
        }

        function rejectPermission() {
            if (!currentPermissionRequestId) {
                console.error('没有权限请求ID');
                return;
            }
            
            if (!stompClient || !stompClient.connected) {
                console.error('WebSocket 未连接');
                alert(i18n.t('wsDisconnectedAlert'));
                return;
            }
            
            console.log('发送拒绝响应:', currentPermissionRequestId);
            
            try {
                stompClient.send("/app/permission/response", {}, JSON.stringify({
                    requestId: currentPermissionRequestId,
                    approved: false,
                    remember: false
                }));
            } catch (e) {
                console.error('发送响应失败:', e);
            }
            
            closePermissionModal();
        }

        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 112) + 'px';
        }

        function handleKeyDown(event) {
            if (event.key === 'Enter' && !event.shiftKey && !event.isComposing) {
                event.preventDefault();
                chatForm.dispatchEvent(new Event('submit'));
            }
        }

        function formatJson(obj, indent = 0) {
            const spaces = '  '.repeat(indent);
            const nextSpaces = '  '.repeat(indent + 1);
            
            if (obj === null) return '<span class="json-null">null</span>';
            if (typeof obj === 'boolean') return `<span class="json-boolean">${obj}</span>`;
            if (typeof obj === 'number') return `<span class="json-number">${obj}</span>`;
            if (typeof obj === 'string') {
                const escaped = obj.replace(/\\/g, '\\\\').replace(/"/g, '\\"').replace(/\n/g, '\\n');
                return `<span class="json-string">"${escaped}"</span>`;
            }
            if (Array.isArray(obj)) {
                if (obj.length === 0) return '[]';
                const items = obj.map(item => nextSpaces + formatJson(item, indent + 1)).join(',\n');
                return `[\n${items}\n${spaces}]`;
            }
            if (typeof obj === 'object') {
                const keys = Object.keys(obj);
                if (keys.length === 0) return '{}';
                const items = keys.map(key => `${nextSpaces}<span class="json-key">"${key}"</span>: ${formatJson(obj[key], indent + 1)}`).join(',\n');
                return `{\n${items}\n${spaces}}`;
            }
            return String(obj);
        }

        function addMessage(content, isUser = false, rawResponse = null, isHistory = false, role = null) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `flex items-start gap-2.5 message-enter ${isUser ? 'flex-row-reverse' : ''} ${isHistory ? 'history-message' : ''}`;
            
            const isTool = role === 'tool';
            const isAssistant = role === 'assistant';
            
            let avatar;
            if (isUser) {
                avatar = `<div class="w-7 h-7 bg-slate-500 rounded-md flex items-center justify-center flex-shrink-0"><svg class="w-4 h-4 text-white" viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg></div>`;
            } else if (isTool) {
                avatar = `<div class="w-7 h-7 bg-emerald-500 rounded-md flex items-center justify-center flex-shrink-0"><svg class="w-4 h-4 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg></div>`;
            } else {
                avatar = `<div class="w-7 h-7 bg-primary rounded-md flex items-center justify-center flex-shrink-0"><svg class="w-4 h-4 text-white" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg></div>`;
            }
            
            const bubbleClass = isUser ? 'bg-primary text-white rounded-xl' : (isTool ? 'bg-emerald-50 text-emerald-800 rounded-xl border border-emerald-200' : 'bg-slate-100 text-slate-700 rounded-xl');
            const clickAttr = !isUser && rawResponse ? `onclick="showJsonModal(this.dataset.raw)" data-raw="${escapeAttr(rawResponse)}" title="${i18n.t('clickToViewRaw')}"` : '';
            const indicator = !isUser && rawResponse ? `<div class="flex items-center gap-1 mt-1.5 pt-1.5 border-t ${isTool ? 'border-emerald-200/50' : 'border-slate-200/50'}"><svg class="w-3 h-3 ${isTool ? 'text-emerald-400' : 'text-slate-400'}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"/></svg><span class="text-xs ${isTool ? 'text-emerald-400' : 'text-slate-400'}">${i18n.t('clickToViewDetail')}</span></div>` : '';
            
            let contentHtml;
            if (isAssistant && !isTool) {
                contentHtml = `<div class="text-sm markdown-content">${marked.parse(content)}</div>`;
            } else {
                contentHtml = `<p class="text-sm leading-relaxed whitespace-pre-wrap">${escapeHtml(content)}</p>`;
            }
            
            messageDiv.innerHTML = `${avatar}<div class="message-bubble ${bubbleClass} px-3.5 py-2.5 max-w-[80%]" ${clickAttr}>${contentHtml}${indicator}</div>`;
            chatContainer.appendChild(messageDiv);
            scrollToBottom();
        }

        function escapeAttr(text) {
            if (!text) return '';
            return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }

        function showJsonModal(rawResponse) {
            try {
                let data = parseRawResponse(rawResponse);
                currentJsonData = data;
                jsonContent.innerHTML = formatJson(data);
            } catch (e) {
                jsonContent.textContent = rawResponse;
            }
            jsonModal.classList.remove('hidden');
        }

        function closeJsonModal() {
            jsonModal.classList.add('hidden');
            currentJsonData = null;
        }

        function copyJson() {
            if (currentJsonData) {
                const text = JSON.stringify(currentJsonData, null, 2);
                navigator.clipboard.writeText(text).then(() => {
                    const btn = event.target.closest('button');
                    const originalText = btn.innerHTML;
                    btn.innerHTML = `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>${i18n.t('copied')}`;
                    setTimeout(() => { btn.innerHTML = originalText; }, 1500);
                });
            }
        }

        function parseRawResponse(rawResponse) {
            if (!rawResponse) return null;
            try {
                let parsed = JSON.parse(rawResponse);
                if (typeof parsed === 'string') {
                    try { parsed = JSON.parse(parsed); } catch (e) {}
                }
                return parsed;
            } catch (e) {
                return rawResponse;
            }
        }

        function addTypingIndicator() {
            const typingDiv = document.createElement('div');
            typingDiv.id = 'typingIndicator';
            typingDiv.className = 'flex items-start gap-2.5 message-enter';
            typingDiv.innerHTML = `<div class="w-7 h-7 bg-primary rounded-md flex items-center justify-center flex-shrink-0"><svg class="w-4 h-4 text-white" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg></div><div class="bg-slate-100 rounded-xl px-3.5 py-2.5"><div class="typing-indicator flex gap-1"><span class="w-1.5 h-1.5 bg-slate-400 rounded-full"></span><span class="w-1.5 h-1.5 bg-slate-400 rounded-full"></span><span class="w-1.5 h-1.5 bg-slate-400 rounded-full"></span></div></div>`;
            chatContainer.appendChild(typingDiv);
            scrollToBottom();
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) indicator.remove();
        }

        function scrollToBottom() {
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function setLoading(loading) {
            isLoading = loading;
            sendBtn.disabled = loading;
            userInput.disabled = loading;
        }

        async function updateUsage() {
            try {
                const response = await fetch('/api/usage');
                const data = await response.json();
                const percentage = Math.min(data.percentage, 100);
                usageBar.style.width = percentage + '%';
                usageText.textContent = `${data.currentTokens.toLocaleString()} / ${data.contextWindow.toLocaleString()} tokens`;
                
                if (percentage < 50) {
                    usageBar.className = 'context-bar h-full bg-primary rounded-full';
                } else if (percentage < 80) {
                    usageBar.className = 'context-bar h-full bg-amber-500 rounded-full';
                } else {
                    usageBar.className = 'context-bar h-full bg-red-500 rounded-full';
                }
            } catch (error) {
                console.error('获取用量失败:', error);
            }
        }

        async function loadHistory() {
            try {
                const response = await fetch('/session/latest');
                const data = await response.json();
                currentSessionId = data.sessionId;
                chatContainer.innerHTML = '';
                
                if (data.messages && data.messages.length > 0) {
                    data.messages.forEach(msg => {
                        const isUser = msg.role === 'user';
                        addMessage(msg.content, isUser, msg.rawResponse, true, msg.role);
                    });
                } else {
                    addMessage(i18n.t('greeting'), false, null, false, 'assistant');
                }
                updateUsage();
                loadSessionList();
            } catch (error) {
                console.error(i18n.t('loadHistoryFailed'), error);
                chatContainer.innerHTML = '';
                addMessage(i18n.t('greeting'), false, null, false, 'assistant');
            }
        }

        async function loadSessionList() {
            try {
                const response = await fetch('/session/recent?limit=0');
                const data = await response.json();
                allSessions = data.sessions || [];
                hasMoreSessions = allSessions.length > pageSize;
                sessionPage = 0;
                renderSessionList();
                updateCurrentSessionLabel();
            } catch (error) {
                console.error('加载会话列表失败:', error);
            }
        }

        function renderSessionList() {
            const start = 0;
            const end = (sessionPage + 1) * pageSize;
            const sessionsToShow = allSessions.slice(start, end);
            
            sessionList.innerHTML = '';
            
            if (sessionsToShow.length === 0) {
                sessionList.innerHTML = `<div class="px-3 py-3 text-xs text-slate-400 text-center">${i18n.t('noSessions')}</div>`;
                loadMoreBtn.classList.add('hidden');
                return;
            }
            
            sessionsToShow.forEach(session => {
                const item = document.createElement('div');
                item.className = `px-3 py-2 cursor-pointer transition-colors ${session.sessionId === currentSessionId ? 'bg-slate-100' : 'hover:bg-slate-50'}`;
                item.onclick = () => handleSessionChange(session.sessionId);
                
                const date = new Date(session.updatedAt);
                const timeStr = date.toLocaleString(i18n.getLang() === 'zh' ? 'zh-CN' : 'en-US', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' });
                const summary = session.summary || i18n.t('newConversation');
                
                item.innerHTML = `
                    <div class="text-sm text-slate-700 truncate">${escapeHtml(summary)}</div>
                    <div class="text-xs text-slate-400 mt-0.5">${timeStr}</div>
                `;
                sessionList.appendChild(item);
            });
            
            if (end < allSessions.length) {
                loadMoreBtn.classList.remove('hidden');
            } else {
                loadMoreBtn.classList.add('hidden');
            }
        }

        function loadMoreSessions() {
            sessionPage++;
            renderSessionList();
        }

        function updateCurrentSessionLabel() {
            if (currentSessionId && allSessions.length > 0) {
                const currentSession = allSessions.find(s => s.sessionId === currentSessionId);
                if (currentSession && currentSession.summary) {
                    currentSessionLabel.textContent = currentSession.summary.length > 20 
                        ? currentSession.summary.substring(0, 20) + '...' 
                        : currentSession.summary;
                } else {
                    currentSessionLabel.textContent = i18n.t('newConversation');
                }
            } else {
                currentSessionLabel.textContent = i18n.t('newConversation');
            }
        }

        function showSessionDropdown() {
            if (hideSessionTimer) {
                clearTimeout(hideSessionTimer);
                hideSessionTimer = null;
            }
            sessionDropdown.classList.remove('hidden');
        }

        function hideSessionDropdown() {
            sessionDropdown.classList.add('hidden');
        }

        function hideSessionDropdownTimer() {
            hideSessionTimer = setTimeout(() => {
                sessionDropdown.classList.add('hidden');
            }, 200);
        }

        function cancelHideSessionDropdown() {
            if (hideSessionTimer) {
                clearTimeout(hideSessionTimer);
                hideSessionTimer = null;
            }
        }

        async function handleSessionChange(sessionId) {
            sessionDropdown.classList.add('hidden');
            
            if (!sessionId || sessionId === currentSessionId) {
                return;
            }
            
            try {
                const response = await fetch('/session/switch/' + sessionId, { method: 'POST' });
                const data = await response.json();
                
                if (data.success) {
                    currentSessionId = sessionId;
                    chatContainer.innerHTML = '';
                    
                    if (data.messages && data.messages.length > 0) {
                        data.messages.forEach(msg => {
                            const isUser = msg.role === 'user';
                            addMessage(msg.content, isUser, msg.rawResponse, true, msg.role);
                        });
                    } else {
                        addMessage(i18n.t('greeting'), false, null, false, 'assistant');
                    }
                    updateUsage();
                    updateCurrentSessionLabel();
                    renderSessionList();
                } else {
                    alert(i18n.t('switchSessionFailed') + ': ' + data.message);
                }
            } catch (error) {
                console.error(i18n.t('switchSessionFailed'), error);
                alert(i18n.t('switchSessionFailed'));
            }
        }

        async function createNewSession() {
            try {
                const response = await fetch('/session/create', { method: 'POST' });
                const data = await response.json();
                if (data.success) {
                    currentSessionId = data.sessionId;
                    chatContainer.innerHTML = '';
                    addMessage(i18n.t('greeting'), false, null, false, 'assistant');
                    updateUsage();
                    loadSessionList();
                }
            } catch (error) {
                console.error(i18n.t('createSessionFailed'), error);
            }
        }

        async function sendMessage(message) {
            if (!message.trim() || isLoading) return;
            
            addMessage(message, true, null, false, 'user');
            setLoading(true);
            addTypingIndicator();
            
            try {
                const response = await fetch('/chat?input=' + encodeURIComponent(message));
                if (!response.ok) throw new Error('Network response was not ok');
                
                const data = await response.json();
                let replyMessage = data.message || i18n.t('noResponse');
                let rawResponse = data.rawResponse;
                
                removeTypingIndicator();
                addMessage(replyMessage, false, rawResponse, false, 'assistant');
                updateUsage();
            } catch (error) {
                removeTypingIndicator();
                addMessage(i18n.t('errorOccurred') + error.message, false, null, false, 'assistant');
            } finally {
                setLoading(false);
                userInput.focus();
            }
        }

        function clearChat() {
            chatContainer.innerHTML = '';
            addMessage(i18n.t('greeting'), false, null, false, 'assistant');
        }

        chatForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const message = userInput.value.trim();
            if (message) {
                sendMessage(message);
                userInput.value = '';
                userInput.style.height = 'auto';
            }
        });

        i18n.init();
        updateLangCheck();
        connectWebSocket();
        loadHistory();
        userInput.focus();
    </script>
</body>
</html>
